<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background with gold gradient -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#FFD166"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Mortarboard cap -->
  <polygon points="16,7 28,13 16,19 4,13" fill="#fff" opacity="0.95"/>
  <!-- Cap top flat part -->
  <rect x="13.5" y="6" width="5" height="2" rx="1" fill="#fff"/>
  <!-- Left and right tassels hint -->
  <line x1="28" y1="13" x2="28" y2="20" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="28" cy="21" r="1.5" fill="#fff"/>
  <!-- Diploma scroll -->
  <rect x="10" y="20" width="12" height="7" rx="2" fill="#fff" opacity="0.85"/>
  <line x1="13" y1="23" x2="19" y2="23" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13" y1="25" x2="17" y2="25" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round"/>
</svg>
